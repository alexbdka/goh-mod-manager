name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
          - os: windows-latest
            id: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.9"
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --group dev --frozen

      - name: Install system dependencies
        if: matrix.id == 'linux'
        run: |
          sudo apt update
          sudo apt install -y libegl1-mesa-dev

      - name: Show tool versions
        run: |
          uv --version
          uv run python --version
          uv run ruff --version
          uv run basedpyright --version
          uv run deptry --version
          uv run pyinstaller --version

      - name: Run static checks
        run: |
          uv run python -m compileall -q src tests scripts
          uv run python scripts/validate_translations.py
          uv run python scripts/build_translations.py --no-update
          uv run deptry .
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright

      - name: Run tests
        run: uv run pytest -q

      # WINDOWS BUILD
      - name: Build (Windows)
        if: matrix.id == 'windows'
        shell: bash
        run: |
          uv run python scripts/build_app.py --onedir --package --skip-tests --skip-translations

      # LINUX BUILD
      - name: Build (Linux)
        if: matrix.id == 'linux'
        shell: bash
        run: |
          uv run python scripts/build_app.py --onefile --package --skip-tests --skip-translations

      # UPLOAD ARTIFACTS
      - name: Upload Windows artifact
        if: matrix.id == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: goh_mod_manager-windows
          path: out/*.zip
          if-no-files-found: error

      - name: Upload Linux artifact
        if: matrix.id == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: goh_mod_manager-linux
          path: out/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
