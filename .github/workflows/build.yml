name: Build and Release (uv + PyInstaller)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            id: linux
          - os: windows-latest
            id: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies (locked)
        run: uv sync --group dev --frozen

      - name: Show tool versions
        run: |
          uv --version
          uv run python --version
          uv run ruff --version
          uv run basedpyright --version
          uv run deptry --version
          uv run pyinstaller --version

      - name: Run static checks
        run: |
          uv run python -m compileall -q src tests scripts
          uv run python scripts/validate_translations.py
          uv run python scripts/build_translations.py --no-update
          uv run deptry .
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright

      - name: Run tests
        run: uv run pytest -q

      # WINDOWS BUILD
      - name: Build (Windows)
        if: matrix.id == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $args = @(
            "--onefile"
            "--clean"
            "--windowed"
            "--paths", "."
            "--name", "goh_mod_manager"
            "--icon", "assets\icons\logo.ico"
          )

          $qm = Get-ChildItem -Path "src\ui\i18n" -Filter *.qm -ErrorAction SilentlyContinue
          if ($qm) {
            $args += "--add-data"
            $args += "src\ui\i18n\*.qm;src\ui\i18n"
          }

          $args += "--add-data"
          $args += "assets\fonts;assets\fonts"
          $args += "--add-data"
          $args += ".app-version;."
          $args += "src\main.py"

          uv run pyinstaller @args

      - name: Package output (Windows)
        if: matrix.id == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path out | Out-Null
          if (!(Test-Path "dist\goh_mod_manager.exe")) {
            throw "Missing dist\goh_mod_manager.exe"
          }
          Compress-Archive -Path "dist\goh_mod_manager.exe" -DestinationPath "out\goh_mod_manager-windows-x64.zip" -Force

      # LINUX BUILD
      - name: Build (Linux)
        if: matrix.id == 'linux'
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --onefile
            --clean
            --windowed
            --paths .
            --name goh_mod_manager
            --icon assets/icons/logo.png
          )

          if ls src/ui/i18n/*.qm >/dev/null 2>&1; then
            args+=(--add-data "src/ui/i18n/*.qm:src/ui/i18n")
          fi

          args+=(--add-data "assets/fonts:assets/fonts")
          args+=(--add-data ".app-version:.")
          args+=(src/main.py)

          uv run pyinstaller "${args[@]}"

      - name: Package output (Linux)
        if: matrix.id == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          test -f dist/goh_mod_manager
          zip -j out/goh_mod_manager-linux-x64.zip dist/goh_mod_manager

      # UPLOAD ARTIFACTS
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: goh_mod_manager-${{ matrix.id }}
          path: out/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -maxdepth 3 -print

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
