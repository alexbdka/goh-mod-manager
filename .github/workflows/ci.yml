name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.9"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev --group docs --frozen

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y libegl1-mesa-dev

      - name: Show tool versions
        run: |
          uv --version
          uv run python --version
          uv run ruff --version
          uv run basedpyright --version
          uv run deptry --version
          uv run zensical --version

      - name: Validate pre-commit configuration
        run: uv run pre-commit validate-config

      - name: Run static checks
        run: |
          uv run python -m compileall -q src tests scripts
          uv run python scripts/validate_translations.py
          uv run python scripts/build_translations.py --no-update
          uv run deptry .
          uv run ruff check .
          uv run ruff format --check .
          uv run basedpyright

      - name: Run tests
        run: uv run pytest -q

      - name: Build documentation
        run: uv run --group docs zensical build
