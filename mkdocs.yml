site_name: GoH Mod Manager
site_description: Documentation for the Gates of Hell Mod Manager project.
site_url: https://alexbdka.github.io/goh-mod-manager/
repo_url: https://github.com/alexbdka/goh-mod-manager
repo_name: alexbdka/goh-mod-manager
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            force_inspection: true
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            members_order: source
            separate_signature: true
            docstring_style: google
nav:
  - Home: index.md
  - Architecture: architecture.md
  - UI Flow: ui-flow.md
  - Translations: translations.md
  - Packaging: packaging.md
  - API:
      - Core: api/core.md
      - Application: api/application.md
      - Services: api/services.md
